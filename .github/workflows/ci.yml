name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# 同一分支/PR 的重复推送，取消进行中的旧任务，节省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端 · Java 21 / Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 JDK 21（Temurin）
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: 编译 · 测试 · 打包
        run: mvn -B --no-transfer-progress -f backend/pom.xml verify

      - name: 归档可执行 jar
        uses: actions/upload-artifact@v4
        with:
          name: kengchacha-backend-jar
          path: backend/target/*.jar
          if-no-files-found: warn
          retention-days: 7

  frontend:
    name: 前端 · Node 20 / Vite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 类型检查（tsc --noEmit）
        run: npx tsc --noEmit

      - name: 生产构建（vite build）
        run: npm run build

      - name: 归档前端产物
        uses: actions/upload-artifact@v4
        with:
          name: kengchacha-frontend-dist
          path: frontend/dist
          if-no-files-found: warn
          retention-days: 7
